<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Barbearia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Escolha seus serviços</h1>

    <div class="container">

        <div class="card">
            <h2>Corte</h2>
            <p>R$ <span class="preco">30</span></p>
            <button class="btn">Adicionar</button>
        </div>

        <div class="card">
            <h2>Barba</h2>
            <p>R$ <span class="preco">20</span></p>
            <button class="btn">Adicionar</button>
        </div>

        <div class="card">
            <h2>Sobrancelha</h2>
            <p>R$ <span class="preco">15</span></p>
            <button class="btn">Adicionar</button>
        </div>

    </div>

    <h2>Total: R$ <span id="total">0</span></h2>

    <script src="script.js"></script>
</body>
</html>
